<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XCute | Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/tokens.css" />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
    <link rel="stylesheet" href="./assets/css/animations.css" />
    <link rel="stylesheet" href="./assets/css/scheduler.css" />
    <script type="module" src="./assets/js/scheduler/main.js"></script>
  </head>
  <body>
    <div class="bg-orb bg-orb--left" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--right" aria-hidden="true"></div>

    <main class="l-page l-scheduler-page">
      <section class="c-hero c-scheduler-hero" aria-labelledby="scheduler-title">
        <a href="/" class="c-kicker">Back To Hub</a>
        <p class="c-version-badge" id="scheduler-version">Version v0.4.4</p>
        <h1 id="scheduler-title" class="c-hero__title">Goal Scheduler</h1>
        <p class="c-hero__subtitle">Open the site and instantly see today's queue, then manage goal tasks in one workspace.</p>
      </section>

      <section class="c-section" aria-label="today-queue">
        <today-queue-panel></today-queue-panel>
      </section>

      <section class="c-section c-scheduler-grid" aria-labelledby="planner-title">
        <h2 id="planner-title" class="c-section__title">Planner</h2>
        <write-key-panel></write-key-panel>
        <goal-panel></goal-panel>
        <goal-workspace-panel></goal-workspace-panel>
        <plan-view></plan-view>
      </section>
    </main>
  </body>
</html>
